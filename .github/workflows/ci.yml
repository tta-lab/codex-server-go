name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check generated files are up-to-date
        run: make check-generate

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Build
        run: make build
